version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: nexuserp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexuserp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexuserp_password
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexuserp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexuserp-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:nexuserp_password@postgres:5432/nexuserp
      JWT_SECRET: dev-jwt-secret-change-in-production-abc123
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-xyz789
      FRONTEND_URL: http://localhost:5173
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3001:3001"
      - "5556:5556"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexuserp-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ""
      VITE_SOCKET_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

# Data stored on Windows disk (./pgdata, ./redisdata) — survives Docker restarts