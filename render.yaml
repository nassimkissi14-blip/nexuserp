services:
  - type: web
    name: nexuserp-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://nexuserp-pupi.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
